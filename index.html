<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>繪畫描稿助手 Pro</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 1. 底層相機 */
        #video-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 1;
        }

        /* 2. 中層繪圖層 (透明畫布) */
        #canvas-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2; pointer-events: none; /* 讓點擊穿透到下面的控制項 */
        }

        /* 3. 上層控制欄 */
        .controls {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.7); color: white;
            z-index: 10; padding: 15px; box-sizing: border-box;
            max-height: 40vh; overflow-y: auto;
        }

        .btn-group { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        button { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #444; color: white; min-width: 80px; }
        button.active { background: #007bff; }
        
        .slider-row { margin: 10px 0; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; }
        input[type="file"] { margin-bottom: 10px; width: 100%; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline muted></video>
    
    <canvas id="canvas-overlay"></canvas>

    <div class="controls">
        <input type="file" id="imageUpload" accept="image/*">
        
        <div class="btn-group">
            <button id="startCam">開啟相機</button>
            <button id="rotateLeft">左轉 90°</button>
            <button id="rotateRight">右轉 90°</button>
            <button id="resetAll">重置全部</button>
        </div>

        <div class="slider-row">
            <span>透明度</span>
            <input type="range" id="opacitySlider" min="0" max="100" value="50">
        </div>
        <div class="slider-row">
            <span>大小</span>
            <input type="range" id="scaleSlider" min="10" max="300" value="100">
        </div>
        <p style="font-size: 12px; color: #aaa;">提示：輸入座標或直接在螢幕上拖動（開發中）</p>
    </div>

    <script>
        const video = document.getElementById('video-bg');
        const canvas = document.getElementById('canvas-overlay');
        const ctx = canvas.getContext('2d');
        
        let img = new Image();
        let rotation = 0;
        let scale = 1;
        let opacity = 0.5;
        let posX = 0, posY = 0;

        // 初始化畫布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. 開啟相機
        document.getElementById('startCam').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                document.getElementById('startCam').style.background = "#28a745";
                document.getElementById('startCam').innerText = "相機已啟動";
            } catch (err) {
                alert("無法開啟相機，請檢查 HTTPS 或權限設定");
            }
        });

        // 2. 圖片上傳
        document.getElementById('imageUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                img.src = event.target.result;
                img.onload = () => {
                    // 圖片載入後置中
                    posX = 0;
                    posY = 0;
                    draw();
                };
            };
            reader.readAsDataURL(file);
        });

        // 3. 控制邏輯
        document.getElementById('rotateLeft').onclick = () => { rotation -= 90; draw(); };
        document.getElementById('rotateRight').onclick = () => { rotation += 90; draw(); };
        document.getElementById('resetAll').onclick = () => {
            rotation = 0; scale = 1; opacity = 0.5; posX = 0; posY = 0;
            document.getElementById('opacitySlider').value = 50;
            document.getElementById('scaleSlider').value = 100;
            draw();
        };

        document.getElementById('opacitySlider').oninput = (e) => {
            opacity = e.target.value / 100;
            draw();
        };

        document.getElementById('scaleSlider').oninput = (e) => {
            scale = e.target.value / 100;
            draw();
        };

        // 4. 繪製函數
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!img.src) return;

            ctx.save();
            // 移動畫筆到螢幕中心
            ctx.translate(canvas.width / 2 + posX, canvas.height / 2 + posY);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.scale(scale, scale);
            ctx.globalAlpha = opacity;
            
            // 繪製圖片（讓圖片中心對準畫筆位置）
            ctx.drawImage(img, -img.width / 2, -img.height / 2);
            ctx.restore();
        }
    </script>
</body>
</html>
