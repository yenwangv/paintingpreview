<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painting Preview</title>
    <style>
        body { margin: 0; }
        #canvas { border: 1px solid black; display: block; margin: 20px auto; }
        .controls { display: flex; flex-direction: column; align-items: center; }
        .collapsible { cursor: pointer; padding: 10px; border: none; background-color: #f1f1f1; }
        .content { display: none; padding: 0 18px; }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="600"></canvas>
    <input type="file" id="imageUpload" accept="image/*" />
    <div class="controls">
        <button id="rotateLeft">Rotate Left</button>
        <button id="rotateRight">Rotate Right</button>
        <button id="resetRotation">Reset Rotation</button>
        <label for="scaleSlider">Scale: </label>
        <input type="range" id="scaleSlider" min="50" max="300" value="100" />%
        <label for="opacitySlider">Opacity: </label>
        <input type="range" id="opacitySlider" min="0" max="100" value="100" />%
    </div>
    <button class="collapsible">Control Bar</button>
    <div class="content">
        <h4>Drag to Position Image</h4>
        <p>Title: <input type="text" id="imageTitle" /></p>
        <p>Position X: <input type="number" id="posX" value="0" /></p>
        <p>Position Y: <input type="number" id="posY" value="0" /></p>
        <button id="setPosition">Set Position</button>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let img = new Image();
        let rotation = 0;
        let scale = 1;
        let opacity = 1;
        let dragging = false;
        let dragStartX, dragStartY;
        let posX = 0, posY = 0;

        document.getElementById('imageUpload').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function (event) {
                img.src = event.target.result;
                img.onload = draw;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('rotateLeft').addEventListener('click', function () {
            rotation -= 90;
            draw();
        });

        document.getElementById('rotateRight').addEventListener('click', function () {
            rotation += 90;
            draw();
        });

        document.getElementById('resetRotation').addEventListener('click', function () {
            rotation = 0;
            draw();
        });

        document.getElementById('scaleSlider').addEventListener('input', function (e) {
            scale = e.target.value / 100;
            draw();
        });

        document.getElementById('opacitySlider').addEventListener('input', function (e) {
            opacity = e.target.value / 100;
            draw();
        });

        document.querySelector('.collapsible').addEventListener('click', function() {
            const content = this.nextElementSibling;
            if (content.style.display === "block") {
                content.style.display = "none";
            } else {
                content.style.display = "block";
            }
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.scale(scale, scale);
            ctx.globalAlpha = opacity;
            ctx.drawImage(img, -img.width / 2 + posX, -img.height / 2 + posY);
            ctx.restore();
        }

        document.getElementById('setPosition').addEventListener('click', function () {
            posX = parseInt(document.getElementById('posX').value);
            posY = parseInt(document.getElementById('posY').value);
            draw();
        });
    </script>
</body>
</html>
