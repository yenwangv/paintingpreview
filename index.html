<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>繪畫助手 Debug 版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 1. 底層相機：最底層 */
        #video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; pointer-events: none;
        }

        /* 2. 中層畫布：處理手勢 */
        #canvas-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; touch-action: none;
        }

        /* 3. 上層控制面板：最高層級，確保點擊有效 */
        #control-panel {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9); color: white;
            z-index: 999; /* 極高層級 */
            transition: transform 0.3s ease-out;
            border-top: 2px solid #555;
        }

        /* 收合狀態：將面板向下推 */
        .collapsed { transform: translateY(calc(100% - 50px)); }

        #toggle-bar {
            height: 50px; line-height: 50px; text-align: center;
            background: #333; cursor: pointer; font-weight: bold;
            border-top-left-radius: 15px; border-top-right-radius: 15px;
            user-select: none;
        }

        .panel-content { padding: 20px; box-sizing: border-box; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { 
            flex: 1; padding: 15px 5px; border: none; border-radius: 10px; 
            background: #444; color: white; font-size: 16px; font-weight: bold;
        }
        #startCam { background: #007bff; }
        #resetBtn { background: #6c757d; }

        .slider-row { margin: 15px 0; display: flex; align-items: center; gap: 15px; }
        .slider-row span { min-width: 60px; font-size: 14px; }
        input[type="range"] { flex: 1; height: 40px; }
        
        input[type="file"] { 
            display: block; width: 100%; margin-bottom: 20px; 
            padding: 10px; background: #222; border-radius: 5px; color: #fff;
        }

        .hint { font-size: 13px; color: #ffc107; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline muted></video>
    <canvas id="canvas-overlay"></canvas>

    <div id="control-panel">
        <div id="toggle-bar" id="btn-toggle">展开 / 收合 控制選單</div>
        <div class="panel-content">
            <input type="file" id="imageUpload" accept="image/*">
            
            <div class="btn-group">
                <button id="startCam">開啟相機</button>
                <button id="resetBtn">重置圖片</button>
            </div>

            <div class="slider-row">
                <span>透明度</span>
                <input type="range" id="opacitySlider" min="0" max="100" value="50">
            </div>
            
            <div class="hint">
                👉 單指：移動圖片位置<br>
                👉 兩指：旋轉與縮放圖片
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-bg');
        const canvas = document.getElementById('canvas-overlay');
        const ctx = canvas.getContext('2d');
        const panel = document.getElementById('control-panel');
        const toggleBar = document.getElementById('toggle-bar');
        
        let img = new Image();
        let posX = 0, posY = 0, scale = 1, rotation = 0, opacity = 0.5;

        // 手勢變數
        let lastDist = 0;
        let lastAngle = 0;
        let isDragging = false;
        let lastX = 0, lastY = 0;

        // --- 修正 1：確保 Canvas 大小正確且點擊不被攔截 ---
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }
        window.addEventListener('resize', init);
        init();

        // --- 修正 2：收合功能 (確保點擊區域夠大) ---
        toggleBar.addEventListener('click', (e) => {
            e.preventDefault();
            panel.classList.toggle('collapsed');
        });

        // --- 修正 3：相機啟動邏輯強化 ---
        document.getElementById('startCam').onclick = async () => {
            const constraints = {
                video: { facingMode: "environment" },
                audio: false
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                // 部分瀏覽器需要明確 call play()
                await video.play(); 
                document.getElementById('startCam').innerText = "相機運作中";
                document.getElementById('startCam').style.background = "#28a745";
            } catch (err) {
                console.error(err);
                alert("相機啟動失敗：請確保網址為 https 開頭，並允許相機權限。");
            }
        };

        // --- 修正 4：檔案讀取 ---
        document.getElementById('imageUpload').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                img.onload = () => {
                    // 初始置中並縮放到適合大小
                    posX = 0; posY = 0; scale = 1; rotation = 0;
                    draw();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        // --- 手勢邏輯 (單指/雙指) ---
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastDist = Math.sqrt(dx * dx + dy * dy);
                lastAngle = Math.atan2(dy, dx);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            
            if (e.touches.length === 1 && isDragging) {
                posX += e.touches[0].clientX - lastX;
                posY += e.touches[0].clientY - lastY;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);

                if (lastDist > 0) {
                    scale *= (dist / lastDist);
                    rotation += (angle - lastAngle) * (180 / Math.PI);
                }
                lastDist = dist;
                lastAngle = angle;
            }
            draw();
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
            lastDist = 0;
        });

        // --- 控制項 ---
        document.getElementById('opacitySlider').oninput = (e) => {
            opacity = e.target.value / 100;
            draw();
        };

        document.getElementById('resetBtn').onclick = () => {
            posX = 0; posY = 0; scale = 1; rotation = 0;
            draw();
        };

        // --- 繪製畫布 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!img.src) return;
            ctx.save();
            ctx.translate(canvas.width / 2 + posX, canvas.height / 2 + posY);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.scale(scale, scale);
            ctx.globalAlpha = opacity;
            ctx.drawImage(img, -img.width / 2, -img.height / 2);
            ctx.restore();
        }
    </script>
</body>
</html>
