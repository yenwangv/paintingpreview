<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera View</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        #camera {
            width: 100%;
            height: 100%;
            position: absolute;
        }
        #controlBar {
            width: 100%;
            position: absolute;
            bottom: 0;
            background: #333;
            color: white;
            transition: max-height 0.3s ease;
            max-height: 50px;
            overflow: hidden;
        }
        .section {
            display: none;
            padding: 10px;
        }
        .section.expanded {
            display: block;
        }
        .header {
            cursor: pointer;
            padding: 10px;
            background: #444;
        }
    </style>
</head>
<body>
    <video id="camera" autoplay></video>
    <div id="controlBar">
        <div class="header" onclick="toggleSection('section1')">Section 1</div>
        <div id="section1" class="section">
            <p>Content for section 1...</p>
        </div>
        <div class="header" onclick="toggleSection('section2')">Section 2</div>
        <div id="section2" class="section">
            <p>Content for section 2...</p>
        </div>
    </div>
    <script>
        const video = document.getElementById('camera');
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            });

        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            section.classList.toggle('expanded');
            if (section.classList.contains('expanded')) {
                section.style.display = 'block';
                document.getElementById('controlBar').style.maxHeight = '200px';
            } else {
                section.style.display = 'none';
                document.getElementById('controlBar').style.maxHeight = '50px';
            }
        }
    </script>
</body>
</html>
