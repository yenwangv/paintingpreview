<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>繪畫瞄稿助手</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        
        /* 相機底層 */
        #video-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 1;
        }

        /* 圖片疊加層 */
        #canvas-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2; touch-action: none; /* 禁用瀏覽器預設手勢，確保拖動順暢 */
        }

        /* 控制面板 */
        .controls {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.8); color: white;
            z-index: 10; padding: 15px; box-sizing: border-box;
            border-top-left-radius: 15px; border-top-right-radius: 15px;
        }

        .btn-group { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        button { 
            flex: 1; padding: 12px 5px; border: none; border-radius: 8px; 
            background: #444; color: white; font-size: 14px; font-weight: bold;
        }
        button:active { background: #666; }
        #startCam { background: #007bff; }
        #lockBtn.locked { background: #dc3545; }

        .slider-row { margin: 12px 0; display: flex; align-items: center; gap: 15px; }
        .slider-row span { min-width: 50px; font-size: 14px; }
        input[type="range"] { flex: 1; height: 25px; }
        
        input[type="file"] { 
            display: block; margin-bottom: 15px; width: 100%; color: #ccc; font-size: 14px;
        }
        
        .hint { font-size: 12px; color: #aaa; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline muted></video>
    
    <canvas id="canvas-overlay"></canvas>

    <div class="controls">
        <input type="file" id="imageUpload" accept="image/*">
        
        <div class="btn-group">
            <button id="startCam">1. 開啟相機</button>
            <button id="rotateRight">旋轉 90°</button>
            <button id="lockBtn">拖動：允許</button>
            <button id="resetAll">重置</button>
        </div>

        <div class="slider-row">
            <span>透明度</span>
            <input type="range" id="opacitySlider" min="0" max="100" value="50">
        </div>
        <div class="slider-row">
            <span>大小</span>
            <input type="range" id="scaleSlider" min="10" max="500" value="100">
        </div>
        <div class="hint">💡 提示：手指直接在螢幕上拖動圖片即可對齊</div>
    </div>

    <script>
        const video = document.getElementById('video-bg');
        const canvas = document.getElementById('canvas-overlay');
        const ctx = canvas.getContext('2d');
        
        let img = new Image();
        let rotation = 0;
        let scale = 1;
        let opacity = 0.5;
        let posX = 0, posY = 0; // 圖片偏移量
        
        let isDragging = false;
        let canDrag = true; // 是否允許拖動
        let lastTouchX = 0;
        let lastTouchY = 0;

        // 初始化畫布
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 1. 相機功能 ---
        document.getElementById('startCam').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                document.getElementById('startCam').innerText = "相機已啟動";
                document.getElementById('startCam').style.background = "#28a745";
            } catch (err) {
                alert("無法開啟相機，請檢查 HTTPS 設定或權限。");
            }
        };

        // --- 2. 圖片載入 ---
        document.getElementById('imageUpload').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                img.src = event.target.result;
                img.onload = () => {
                    posX = 0; posY = 0; // 換圖時重置位置
                    draw();
                };
            };
            reader.readAsDataURL(file);
        };

        // --- 3. 觸控拖動邏輯 ---
        canvas.addEventListener('touchstart', (e) => {
            if (!canDrag) return;
            isDragging = true;
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDragging || !canDrag) return;
            
            const touchX = e.touches[0].clientX;
            const touchY = e.touches[0].clientY;
            
            // 計算移動距離
            const deltaX = touchX - lastTouchX;
            const deltaY = touchY - lastTouchY;
            
            posX += deltaX;
            posY += deltaY;
            
            lastTouchX = touchX;
            lastTouchY = touchY;
            
            draw();
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // --- 4. 控制項按鈕 ---
        document.getElementById('rotateRight').onclick = () => { rotation += 90; draw(); };
        
        document.getElementById('lockBtn').onclick = function() {
            canDrag = !canDrag;
            this.innerText = canDrag ? "拖動：允許" : "拖動：鎖定";
            this.classList.toggle('locked', !canDrag);
        };

        document.getElementById('resetAll').onclick = () => {
            rotation = 0; scale = 1; opacity = 0.5; posX = 0; posY = 0;
            document.getElementById('opacitySlider').value = 50;
            document.getElementById('scaleSlider').value = 100;
            draw();
        };

        document.getElementById('opacitySlider').oninput = (e) => {
            opacity = e.target.value / 100;
            draw();
        };

        document.getElementById('scaleSlider').oninput = (e) => {
            scale = e.target.value / 100;
            draw();
        };

        // --- 5. 核心繪製函數 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!img.src) return;

            ctx.save();
            // 以螢幕中心為基準，再加上移動的位移量 (posX, posY)
            ctx.translate(canvas.width / 2 + posX, canvas.height / 2 + posY);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.scale(scale, scale);
            ctx.globalAlpha = opacity;
            
            // 繪製圖片
            ctx.drawImage(img, -img.width / 2, -img.height / 2);
            ctx.restore();
        }
    </script>
</body>
</html>
