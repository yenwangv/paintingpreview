<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painting Preview</title>
    <style>
        /* Add your styles here */
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        #cameraView {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }
        #controlBar {
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 1;
            background: rgba(255, 255, 255, 0.8);
            transition: opacity 0.5s;
        }
        .collapsible {
            display: none;
        }
    </style>
</head>
<body>
    <div id="cameraView"></div>
    <div id="controlBar">
        <!-- Control Bar Content -->
    </div>
    <script>
        // JavaScript for collapsible sections
        document.addEventListener('DOMContentLoaded', () => {
            const collapsibles = document.querySelectorAll('.collapsible');
            collapsibles.forEach(section => {
                section.style.display = 'none'; // Make all sections collapsible by default
            });
        });
    </script>
</body>
</html>
